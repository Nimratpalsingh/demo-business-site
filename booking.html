<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment | Nimratpal Singh</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="booking-wrapper">
    <div class="booking-card">
        <h2>Book a Consultation</h2>
        <p class="booking-subtext">Fill the details below and we’ll contact you within 24 hours.</p>

        <form id="bookingForm">
    <input type="text" name="name" placeholder="Full Name" required>
    <input type="tel" name="phone" placeholder="Phone Number" required>
    <input type="email" name="email" placeholder="Email Address" required>
    <textarea name="message" placeholder="Tell us about your project" rows="4"></textarea>

    <button type="submit" class="btn">Submit Booking</button>
</form>

<p id="responseMessage"></p>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
</section>
<script>
window.addEventListener("load", function () {
    document.body.classList.add("loaded");
});
</script>
<script>
window.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("bookingForm");

    form.addEventListener("submit", async function(e) {
        e.preventDefault();

        const data = {
            name: form.name.value,
            phone: form.phone.value,
            email: form.email.value,
            message: form.message.value
        };

        try {
            const response = await fetch("/api/book", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            console.log("Status:", response.status);

            const result = await response.json();
document.getElementById("responseMessage").innerText = result.message;
form.reset();

        } catch (err) {
            console.error("Fetch error:", err);
        }
    });

});
</script>

<script>
console.log("JS loaded");
</script>
</body>
</html>
