<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment | Nimratpal Singh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="booking-wrapper">
    <div class="booking-card">
        <h2>Book a Consultation</h2>
        <p class="booking-subtext">Fill the details below and we’ll contact you within 24 hours.</p>

        <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <textarea name="message" placeholder="Tell us about your project" rows="4"></textarea>

            <button type="submit" class="btn">Submit Booking</button>
        </form>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
</section>

</body>
</html>
